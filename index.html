<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Operations Dashboard — Wodgina Site</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}
#loadingOverlay{position:fixed;inset:0;background:rgba(15,17,23,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
#loadingOverlay.hidden{display:none;}
.spinner{width:50px;height:50px;border:3px solid #2d3748;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:14px;color:#94a3b8;}
/* Header */
.header{background:linear-gradient(135deg,#1a1f2e,#16213e,#0f3460);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d3748;box-shadow:0 4px 20px rgba(0,0,0,.4);position:sticky;top:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-icon{width:46px;height:46px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 12px rgba(59,130,246,.3);}
.hdr-title{font-size:19px;font-weight:700;color:#f1f5f9;}
.hdr-sub{font-size:11px;color:#94a3b8;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-meta{font-size:11px;color:#64748b;text-align:right;line-height:1.6;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.5px;}
.live-badge.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;}
.live-badge.warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;}
.live-badge.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444;}
.live-dot{width:6px;height:6px;border-radius:50%;}
.live-badge.ok .live-dot{background:#10b981;animation:pulse 2s infinite;}
.live-badge.warn .live-dot{background:#f59e0b;animation:pulse 2s infinite;}
.live-badge.err .live-dot{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
/* Data bar */
.dbar{background:#161b27;border-bottom:1px solid #2d3748;padding:7px 28px;display:flex;align-items:center;gap:16px;font-size:11px;color:#64748b;flex-wrap:wrap;}
.dbar-item{display:flex;align-items:center;gap:5px;}
.ddot{width:6px;height:6px;border-radius:50%;}
.ddot.ok{background:#10b981;}.ddot.warn{background:#f59e0b;}.ddot.err{background:#ef4444;}
.rfr{margin-left:auto;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#60a5fa;padding:4px 13px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.rfr:hover{background:rgba(59,130,246,.2);}
/* Nav */
.nav{background:#1a1f2e;padding:0 28px;display:flex;gap:2px;border-bottom:1px solid #2d3748;overflow-x:auto;}
.nav::-webkit-scrollbar{height:3px;}.nav::-webkit-scrollbar-thumb{background:#2d3748;}
.ntab{padding:13px 18px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;}
.ntab:hover{color:#94a3b8;}.ntab.active{color:#3b82f6;border-bottom-color:#3b82f6;}
/* Pages */
.page{display:none;padding:22px 28px;max-width:1600px;margin:0 auto;}
.page.active{display:block;}
/* Error */
#errPanel{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:22px;margin:22px 28px;display:none;}
#errPanel.show{display:block;}
.err-title{font-size:15px;font-weight:700;color:#f87171;margin-bottom:8px;}
.err-body{font-size:12px;color:#64748b;line-height:1.7;}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:linear-gradient(135deg,#1e2433,#1a1f2e);border:1px solid #2d3748;border-radius:13px;padding:18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.kpi.blue::before{background:linear-gradient(90deg,#3b82f6,#1d4ed8);}
.kpi.green::before{background:linear-gradient(90deg,#10b981,#059669);}
.kpi.amber::before{background:linear-gradient(90deg,#f59e0b,#d97706);}
.kpi.red::before{background:linear-gradient(90deg,#ef4444,#dc2626);}
.kpi.purple::before{background:linear-gradient(90deg,#8b5cf6,#7c3aed);}
.kpi.cyan::before{background:linear-gradient(90deg,#06b6d4,#0891b2);}
.kpi.orange::before{background:linear-gradient(90deg,#f97316,#ea580c);}
.kpi.pink::before{background:linear-gradient(90deg,#ec4899,#db2777);}
.kpi-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px;}
.kpi-val{font-size:34px;font-weight:800;line-height:1;}
.kpi.blue .kpi-val{color:#60a5fa;}.kpi.green .kpi-val{color:#34d399;}.kpi.amber .kpi-val{color:#fbbf24;}
</html>
